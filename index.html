<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultivator Hand Tracking - S.Kom Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
        }
        
        .cultivator-font {
            font-family: 'Orbitron', sans-serif;
        }
        
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        #video-input {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transform: scaleX(-1); /* Mirror effect */
        }
        
        .glass-panel {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }
        
        .neon-text {
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5),
                         0 0 20px rgba(0, 255, 136, 0.3),
                         0 0 30px rgba(0, 255, 136, 0.2);
        }
        
        .energy-ring {
            position: absolute;
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-out infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .loading-spinner {
            border: 3px solid rgba(0, 255, 136, 0.1);
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hand-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #00ff88 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #00ff88;
        }
    </style>
</head>
<body class="text-white">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">
        <div class="loading-spinner mb-4"></div>
        <h2 class="cultivator-font text-2xl text-emerald-400 neon-text">Initializing Cultivation System...</h2>
        <p class="text-gray-400 mt-2">Please allow camera access</p>
    </div>

    <!-- Main Container -->
    <div id="canvas-container">
        <!-- Hidden Video Input -->
        <video id="video-input" playsinline></video>
        
        <!-- Main Canvas for Particles -->
        <canvas id="output-canvas"></canvas>
        
        <!-- UI Overlay -->
        <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-20">
            <!-- Header -->
            <div class="absolute top-6 left-6 glass-panel rounded-xl p-4 pointer-events-auto">
                <div class="flex items-center gap-3">
                    <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                    <div>
                        <h1 class="cultivator-font text-xl font-bold text-emerald-400 neon-text">QI TRACKER</h1>
                        <p class="text-xs text-gray-400">Hand Tracking System v1.0</p>
                    </div>
                </div>
            </div>

            <!-- Stats Panel -->
            <div class="absolute top-6 right-6 glass-panel rounded-xl p-4 pointer-events-auto min-w-[200px]">
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">Qi Energy</span>
                        <span id="energy-level" class="cultivator-font text-emerald-400 font-bold">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-2">
                        <div id="energy-bar" class="bg-gradient-to-r from-emerald-500 to-cyan-400 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <span class="text-gray-400 text-sm">Particles</span>
                        <span id="particle-count" class="text-cyan-400 font-mono">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 text-sm">Hand Detected</span>
                        <span id="hand-status" class="text-red-400 font-mono">NO</span>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="absolute bottom-6 left-6 glass-panel rounded-xl p-4 pointer-events-auto">
                <div class="flex gap-3">
                    <button onclick="changeMode('fire')" class="px-4 py-2 bg-red-500/20 border border-red-500/50 rounded-lg hover:bg-red-500/30 transition-all text-red-400 text-sm font-medium">
                        🔥 Fire Qi
                    </button>
                    <button onclick="changeMode('water')" class="px-4 py-2 bg-blue-500/20 border border-blue-500/50 rounded-lg hover:bg-blue-500/30 transition-all text-blue-400 text-sm font-medium">
                        💧 Water Qi
                    </button>
                    <button onclick="changeMode('nature')" class="px-4 py-2 bg-emerald-500/20 border border-emerald-500/50 rounded-lg hover:bg-emerald-500/30 transition-all text-emerald-400 text-sm font-medium">
                        🌿 Nature Qi
                    </button>
                    <button onclick="changeMode('void')" class="px-4 py-2 bg-purple-500/20 border border-purple-500/50 rounded-lg hover:bg-purple-500/30 transition-all text-purple-400 text-sm font-medium">
                        🌌 Void Qi
                    </button>
                </div>
            </div>

            <!-- Instructions -->
            <div class="absolute bottom-6 right-6 glass-panel rounded-xl p-4 pointer-events-auto max-w-xs">
                <h3 class="cultivator-font text-emerald-400 mb-2 text-sm">Cultivation Guide</h3>
                <ul class="text-xs text-gray-400 space-y-1">
                    <li>• Raise your hand to gather Qi</li>
                    <li>• Move fingers to control particles</li>
                    <li>• Pinch to concentrate energy</li>
                    <li>• Wave to disperse Qi</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CULTIVATOR HAND TRACKING SYSTEM
        // ==========================================
        
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const videoElement = document.getElementById('video-input');
        const loadingScreen = document.getElementById('loading-screen');
        
        // UI Elements
        const energyLevel = document.getElementById('energy-level');
        const energyBar = document.getElementById('energy-bar');
        const particleCountEl = document.getElementById('particle-count');
        const handStatus = document.getElementById('hand-status');
        
        // State
        let particles = [];
        let handLandmarks = null;
        let currentMode = 'nature';
        let canvasWidth, canvasHeight;
        let animationId;
        let qiEnergy = 0;
        
        // Mode Configurations
        const modes = {
            fire: {
                primary: '#ff4444',
                secondary: '#ff8844',
                accent: '#ffaa44',
                particleSize: 3,
                trail: 0.3
            },
            water: {
                primary: '#4488ff',
                secondary: '#44aaff',
                accent: '#88ccff',
                particleSize: 2.5,
                trail: 0.2
            },
            nature: {
                primary: '#00ff88',
                secondary: '#44ffaa',
                accent: '#88ffcc',
                particleSize: 2,
                trail: 0.15
            },
            void: {
                primary: '#aa44ff',
                secondary: '#ff44ff',
                accent: '#ffffff',
                particleSize: 2,
                trail: 0.1
            }
        };
        
        // Particle Class
        class Particle {
            constructor(x, y, targetX, targetY) {
                this.x = x + (Math.random() - 0.5) * 100;
                this.y = y + (Math.random() - 0.5) * 100;
                this.targetX = targetX;
                this.targetY = targetY;
                this.vx = 0;
                this.vy = 0;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * modes[currentMode].particleSize + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.2;
            }
            
            update() {
                // Attraction to target (hand/finger)
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // Qi force field
                const force = Math.min(dist * 0.001, 0.5);
                this.vx += dx * force * 0.1;
                this.vy += dy * force * 0.1;
                
                // Add some turbulence
                this.vx += Math.sin(this.angle) * 0.5;
                this.vy += Math.cos(this.angle) * 0.5;
                this.angle += this.spin;
                
                // Apply velocity with damping
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.x += this.vx;
                this.y += this.vy;
                
                // Life decay
                this.life -= this.decay;
                this.size *= 0.99;
            }
            
            draw(ctx) {
                const mode = modes[currentMode];
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                
                gradient.addColorStop(0, mode.primary);
                gradient.addColorStop(0.5, mode.secondary);
                gradient.addColorStop(1, `rgba(0,0,0,0)`);
                
                ctx.globalAlpha = this.life;
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Core glow
                ctx.fillStyle = mode.accent;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // Initialize Canvas
        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // Initialize MediaPipe Hands
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onResults);
        
        // Camera Setup
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        // Handle Results
        function onResults(results) {
            // Clear with trail effect
            ctx.fillStyle = `rgba(10, 10, 20, ${modes[currentMode].trail})`;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handLandmarks = results.multiHandLandmarks[0];
                handStatus.textContent = 'YES';
                handStatus.className = 'text-emerald-400 font-mono';
                
                // Calculate Qi Energy based on hand openness
                calculateQiEnergy(handLandmarks);
                
                // Generate particles at fingertips
                generateParticles(handLandmarks);
                
                // Draw hand connections
                drawHandConnections(handLandmarks);
                
                // Draw energy field
                drawEnergyField(handLandmarks);
            } else {
                handLandmarks = null;
                handStatus.textContent = 'NO';
                handStatus.className = 'text-red-400 font-mono';
                qiEnergy = Math.max(0, qiEnergy - 2);
                updateEnergyUI();
            }
            
            // Update and draw particles
            updateParticles();
            
            // Update particle count
            particleCountEl.textContent = particles.length;
        }
        
        function calculateQiEnergy(landmarks) {
            // Calculate hand spread (distance between wrist and fingertips)
            const wrist = landmarks[0];
            const fingertips = [4, 8, 12, 16, 20]; // Thumb, Index, Middle, Ring, Pinky
            
            let totalSpread = 0;
            fingertips.forEach(idx => {
                const tip = landmarks[idx];
                const dist = Math.sqrt(
                    Math.pow(tip.x - wrist.x, 2) + 
                    Math.pow(tip.y - wrist.y, 2)
                );
                totalSpread += dist;
            });
            
            // Normalize and update energy
            const normalizedEnergy = Math.min(totalSpread * 200, 100);
            qiEnergy = qiEnergy * 0.9 + normalizedEnergy * 0.1;
            updateEnergyUI();
        }
        
        function updateEnergyUI() {
            energyLevel.textContent = Math.round(qiEnergy) + '%';
            energyBar.style.width = qiEnergy + '%';
            
            // Change color based on energy level
            if (qiEnergy > 80) {
                energyBar.className = 'bg-gradient-to-r from-yellow-400 to-red-500 h-2 rounded-full transition-all duration-300';
            } else if (qiEnergy > 50) {
                energyBar.className = 'bg-gradient-to-r from-emerald-400 to-cyan-400 h-2 rounded-full transition-all duration-300';
            } else {
                energyBar.className = 'bg-gradient-to-r from-blue-500 to-emerald-500 h-2 rounded-full transition-all duration-300';
            }
        }
        
        function generateParticles(landmarks) {
            const fingertips = [4, 8, 12, 16, 20];
            const mode = modes[currentMode];
            
            // Number of particles based on qi energy
            const particleCount = Math.floor(qiEnergy / 20) + 1;
            
            fingertips.forEach(idx => {
                const tip = landmarks[idx];
                const x = (1 - tip.x) * canvasWidth; // Mirror X
                const y = tip.y * canvasHeight;
                
                for (let i = 0; i < particleCount; i++) {
                    if (particles.length < 500) { // Limit max particles
                        particles.push(new Particle(x, y, x, y));
                    }
                }
            });
            
            // Also generate from palm center
            const palm = landmarks[9];
            const palmX = (1 - palm.x) * canvasWidth;
            const palmY = palm.y * canvasHeight;
            
            for (let i = 0; i < particleCount / 2; i++) {
                if (particles.length < 500) {
                    particles.push(new Particle(palmX, palmY, palmX, palmY));
                }
            }
        }
        
        function drawHandConnections(landmarks) {
            const mode = modes[currentMode];
            ctx.strokeStyle = mode.primary;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5;
            
            // Draw connections
            const connections = [
                [0,1], [1,2], [2,3], [3,4], // Thumb
                [0,5], [5,6], [6,7], [7,8], // Index
                [0,9], [9,10], [10,11], [11,12], // Middle
                [0,13], [13,14], [14,15], [15,16], // Ring
                [0,17], [17,18], [18,19], [19,20], // Pinky
                [5,9], [9,13], [13,17] // Palm
            ];
            
            connections.forEach(([start, end]) => {
                const startPoint = landmarks[start];
                const endPoint = landmarks[end];
                
                ctx.beginPath();
                ctx.moveTo((1 - startPoint.x) * canvasWidth, startPoint.y * canvasHeight);
                ctx.lineTo((1 - endPoint.x) * canvasWidth, endPoint.y * canvasHeight);
                ctx.stroke();
            });
            
            // Draw joints
            landmarks.forEach((landmark, index) => {
                const x = (1 - landmark.x) * canvasWidth;
                const y = landmark.y * canvasHeight;
                
                ctx.fillStyle = index % 4 === 0 ? mode.accent : mode.secondary;
                ctx.beginPath();
                ctx.arc(x, y, index % 4 === 0 ? 6 : 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.globalAlpha = 1;
        }
        
        function drawEnergyField(landmarks) {
            if (qiEnergy < 30) return;
            
            const mode = modes[currentMode];
            const palm = landmarks[9];
            const centerX = (1 - palm.x) * canvasWidth;
            const centerY = palm.y * canvasHeight;
            
            // Draw rotating energy rings
            const time = Date.now() * 0.001;
            const ringCount = Math.floor(qiEnergy / 25);
            
            for (let i = 0; i < ringCount; i++) {
                const radius = 50 + i * 30 + Math.sin(time + i) * 10;
                const alpha = (qiEnergy / 100) * (1 - i * 0.2);
                
                ctx.strokeStyle = mode.primary;
                ctx.lineWidth = 2;
                ctx.globalAlpha = alpha * 0.3;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Rotating segments
                ctx.globalAlpha = alpha * 0.5;
                ctx.beginPath();
                ctx.arc(
                    centerX, 
                    centerY, 
                    radius, 
                    time + i * 1.5, 
                    time + i * 1.5 + Math.PI
                );
                ctx.stroke();
            }
            
            ctx.globalAlpha = 1;
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(ctx);
                
                if (p.life <= 0 || p.size < 0.1) {
                    particles.splice(i, 1);
                }
            }
        }
        
        // Mode Switching
        function changeMode(mode) {
            currentMode = mode;
            
            // Visual feedback
            const btn = event.target;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 100);
            
            // Clear particles for dramatic effect
            particles = [];
            
            // Update UI colors
            const modeData = modes[mode];
            document.documentElement.style.setProperty('--primary-color', modeData.primary);
        }
        
        // Start Camera
        async function startCamera() {
            try {
                await camera.start();
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500);
            } catch (error) {
                console.error('Error starting camera:', error);
                loadingScreen.innerHTML = `
                    <div class="text-red-400 text-center">
                        <h2 class="text-xl mb-2">Camera Error</h2>
                        <p class="text-sm">Please allow camera access and reload</p>
                    </div>
                `;
            }
        }
        
        // Initialize
        window.addEventListener('load', () => {
            startCamera();
        });
        
        // Background animation (subtle even without hand)
        function backgroundAnimation() {
            if (!handLandmarks) {
                ctx.fillStyle = 'rgba(10, 10, 20, 0.1)';
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                
                // Subtle ambient particles
                if (Math.random() < 0.1) {
                    const x = Math.random() * canvasWidth;
                    const y = Math.random() * canvasHeight;
                    const mode = modes[currentMode];
                    
                    ctx.fillStyle = mode.primary;
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.arc(x, y, Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
            requestAnimationFrame(backgroundAnimation);
        }
        
        backgroundAnimation();
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case '1': changeMode('fire'); break;
                case '2': changeMode('water'); break;
                case '3': changeMode('nature'); break;
                case '4': changeMode('void'); break;
            }
        });
    </script>
</body>
</html>
