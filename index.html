<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Particle Magic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a;
        }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #video {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .glow-text {
            text-shadow: 0 0 20px rgba(0, 255, 128, 0.5), 0 0 40px rgba(0, 255, 128, 0.3);
        }
    </style>
</head>
<body class="bg-black text-white">
    <!-- Hidden video for hand tracking -->
    <video id="video" class="hidden"></video>
    
    <!-- Main canvas for particles -->
    <canvas id="canvas"></canvas>
    
    <!-- UI Overlay -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none flex flex-col items-center justify-center z-10">
        <div id="startScreen" class="text-center pointer-events-auto">
            <h1 class="text-5xl md:text-7xl font-bold mb-4 glow-text bg-gradient-to-r from-green-400 via-emerald-500 to-teal-400 bg-clip-text text-transparent">
                Hand Particle Magic
            </h1>
            <p class="text-gray-400 text-lg mb-8 max-w-md mx-auto px-4">
                Gerakkan tangan Anda untuk mengendalikan partikel. <br>
                <span class="text-sm text-gray-500">Izinkan akses kamera untuk memulai</span>
            </p>
            <button id="startBtn" class="px-8 py-4 bg-gradient-to-r from-green-500 to-emerald-600 rounded-full font-semibold text-lg hover:scale-105 transition-transform shadow-lg shadow-green-500/30">
                Mulai Pengalaman
            </button>
        </div>
        
        <div id="loadingScreen" class="hidden text-center">
            <div class="w-16 h-16 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-green-400">Memuat hand tracking...</p>
        </div>
        
        <div id="statusIndicator" class="hidden fixed top-6 right-6 flex items-center gap-2 bg-black/50 backdrop-blur-sm px-4 py-2 rounded-full border border-green-500/30">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-sm text-green-400">Hand Tracking Aktif</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
